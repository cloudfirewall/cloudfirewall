name: cloudfirewall-e2e

services:
  api:
    build:
      context: ../..
      dockerfile: tests/e2e/Dockerfile.api
    environment:
      CLOUDFIREWALL_ADMIN_USERNAME: admin
      CLOUDFIREWALL_ADMIN_PASSWORD: admin
      CLOUDFIREWALL_API_KEY: dev-api-key
    command:
      - -config
      - ${API_CONFIG_PATH:-/app/compiled/public-web-server.nft.golden}
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 2s
      timeout: 2s
      retries: 30

  enrollment-token:
    image: curlimages/curl:8.7.1
    user: "0:0"
    depends_on:
      api:
        condition: service_healthy
    volumes:
      - token-share:/shared
    entrypoint:
      - sh
      - -ec
      - |
        response="$$(curl -fsS -X POST http://api:8080/api/v1/enrollment-tokens \
          -H 'X-API-Key: dev-api-key' \
          -H 'Content-Type: application/json' \
          -d '{"ttlSeconds":600}')"
        echo "$$response" > /shared/enrollment.json
        printf '%s' "$$response" | sed -n 's/.*"token":"\([^"]*\)".*/\1/p' > /shared/enrollment.token

  enrollment-token-b:
    image: curlimages/curl:8.7.1
    user: "0:0"
    depends_on:
      api:
        condition: service_healthy
    volumes:
      - token-share-b:/shared
    entrypoint:
      - sh
      - -ec
      - |
        response="$$(curl -fsS -X POST http://api:8080/api/v1/enrollment-tokens \
          -H 'X-API-Key: dev-api-key' \
          -H 'Content-Type: application/json' \
          -d '{"ttlSeconds":600}')"
        echo "$$response" > /shared/enrollment.json
        printf '%s' "$$response" | sed -n 's/.*"token":"\([^"]*\)".*/\1/p' > /shared/enrollment.token

  agent:
    build:
      context: ../..
      dockerfile: tests/e2e/Dockerfile.agent
    depends_on:
      api:
        condition: service_healthy
      enrollment-token:
        condition: service_completed_successfully
    cap_add:
      - NET_ADMIN
    environment:
      CLOUDFIREWALL_API_URL: http://api:8080
      CLOUDFIREWALL_AGENT_HOSTNAME: e2e-agent-01
      CLOUDFIREWALL_AGENT_NAME: e2e-agent-01
      CLOUDFIREWALL_AGENT_VERSION: e2e
      CLOUDFIREWALL_DRY_RUN: "false"
    volumes:
      - token-share:/shared:ro

  agent-b:
    build:
      context: ../..
      dockerfile: tests/e2e/Dockerfile.agent
    depends_on:
      api:
        condition: service_healthy
      enrollment-token-b:
        condition: service_completed_successfully
    cap_add:
      - NET_ADMIN
    environment:
      CLOUDFIREWALL_API_URL: http://api:8080
      CLOUDFIREWALL_AGENT_HOSTNAME: e2e-agent-02
      CLOUDFIREWALL_AGENT_NAME: e2e-agent-02
      CLOUDFIREWALL_AGENT_VERSION: e2e
      CLOUDFIREWALL_DRY_RUN: "false"
    volumes:
      - token-share-b:/shared:ro

  probe:
    build:
      context: ../..
      dockerfile: tests/e2e/Dockerfile.probe
    depends_on:
      agent:
        condition: service_started

volumes:
  token-share:
  token-share-b:
