name: Release Agent

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version tag, for example v0.1.0"
        required: true

permissions:
  contents: write

jobs:
  release-agent:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Test
        shell: bash
        run: env GOCACHE=/tmp/go-build-cache go test ./...

      - name: Package Agent Release
        shell: bash
        run: env GOCACHE=/tmp/go-build-cache VERSION="${{ steps.version.outputs.value }}" sh ./scripts/package-agent-release.sh

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.value }}
          files: |
            dist/releases/cloudfirewall-agent_${{ steps.version.outputs.value }}_linux_amd64.tar.gz
            dist/releases/cloudfirewall-agent_${{ steps.version.outputs.value }}_linux_arm64.tar.gz
          generate_release_notes: true
